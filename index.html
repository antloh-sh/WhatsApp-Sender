<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Queue Sender</title>
  <style>
    :root {
      --bg: #f9fafb;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #10b981;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    main {
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }

    .card h2 {
      font-size: 15px;
      margin: 0 0 8px 0;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 14px;
    }

    input[type=file] {
      margin-bottom: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }

    .queue {
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .contact {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .contact:last-child { border-bottom: none; }

    .contact.active {
      background: #ecfdf5;
      border-left: 4px solid var(--primary);
    }

    .contact .name { font-weight: 500; }
    .contact .number { font-size: 12px; color: var(--muted); }

    .status {
      font-size: 12px;
      margin-top: 4px;
    }

    .status.pending { color: var(--muted); }
    .status.opened { color: var(--blue); }
    .status.sent { color: var(--primary); }

    .preview {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #f3f4f6;
      min-height: 80px;
      white-space: pre-wrap;
    }

    .buttons {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
    }

    button.primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    footer {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>WhatsApp Queue Sender</header>

  <main>
    <div class="card">
      <h2>1. Upload CSV</h2>
      <input type="file" id="csvFile" accept=".csv" />
      <div class="hint">CSV must contain headers: <strong>Name</strong>, <strong>ContactNumber</strong> (with country code)</div>
      <div id="csvStatus" class="hint"></div>
    </div>

    <div class="card">
      <h2>2. Message Template</h2>
      <textarea id="template" placeholder="Hi {{Name}}, this is a reminder for your appointment."></textarea>
      <div class="hint">Available field: {{Name}}</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>3. Contact Queue</h2>
        <div id="queue" class="queue"></div>
      </div>

      <div class="card">
        <h2>Message Preview</h2>
        <div id="preview" class="preview"></div>
        <div class="buttons">
          <button id="openBtn" class="primary" disabled>Open in WhatsApp</button>
          <button id="sentBtn" disabled>Mark as Sent</button>
          <button id="skipBtn" disabled>Skip</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    🔒 All processing happens in your browser. No data is stored or uploaded.
  </footer>

  <script>
    const csvFile = document.getElementById('csvFile');
    const queueEl = document.getElementById('queue');
    const previewEl = document.getElementById('preview');
    const openBtn = document.getElementById('openBtn');
    const sentBtn = document.getElementById('sentBtn');
    const skipBtn = document.getElementById('skipBtn');
    const templateEl = document.getElementById('template');
    const csvStatus = document.getElementById('csvStatus');

    let contacts = [];
    let currentIndex = -1;

    csvFile.addEventListener('change', () => {
      const file = csvFile.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => parseCSV(e.target.result);
      reader.readAsText(file);
    });

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines.shift().split(',').map(h => h.trim());

      if (!headers.includes('Name') || !headers.includes('ContactNumber')) {
        csvStatus.textContent = '❌ Invalid CSV headers';
        return;
      }

      contacts = lines.map(line => {
        const values = line.split(',');
        const obj = {};
        headers.forEach((h, i) => obj[h] = values[i]?.trim() || '');
        obj._status = 'pending';
        return obj;
      });

      csvStatus.textContent = `✅ Loaded ${contacts.length} contacts`;
      currentIndex = 0;
      renderQueue();
      selectContact(0);
    }

    function renderQueue() {
      queueEl.innerHTML = '';
      contacts.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'contact' + (i === currentIndex ? ' active' : '');
        div.innerHTML = `
          <div class="name">${c.Name}</div>
          <div class="number">+${c.ContactNumber}</div>
          <div class="status ${c._status}">${c._status}</div>
        `;
        div.onclick = () => selectContact(i);
        queueEl.appendChild(div);
      });
    }

    function selectContact(index) {
      currentIndex = index;
      const c = contacts[index];
      if (!c) return;

      const msg = templateEl.value.replace(/{{Name}}/g, c.Name);
      previewEl.textContent = msg;

      openBtn.disabled = false;
      sentBtn.disabled = false;
      skipBtn.disabled = false;

      renderQueue();
    }

    openBtn.onclick = () => {
      const c = contacts[currentIndex];
      if (!c) return;
      c._status = 'opened';

      const msg = encodeURIComponent(templateEl.value.replace(/{{Name}}/g, c.Name));
      const url = `https://wa.me/${c.ContactNumber}?text=${msg}`;
      window.open(url, '_blank');
      renderQueue();
    };

    sentBtn.onclick = () => markAndMove('sent');
    skipBtn.onclick = () => markAndMove('pending');

    function markAndMove(status) {
      if (currentIndex < 0) return;
      contacts[currentIndex]._status = status;
      const next = currentIndex + 1;
      if (next < contacts.length) selectContact(next);
      renderQueue();
    }
  </script>
</body>
</html>
